name: CI/CD - Churn Prediction API

on:
  push:
    branches: [main]

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
  IMAGE: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}:latest

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run pytest tests/ --cov=app --cov=main --cov-fail-under=70

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${{ vars.ECR_REPOSITORY }}" >/dev/null 2>&1 \
          || aws ecr create-repository --repository-name "${{ vars.ECR_REPOSITORY }}"
      - uses: aws-actions/amazon-ecr-login@v2
      - run: docker build -t "$IMAGE" . && docker push "$IMAGE"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: REGISTRY,IMAGE,AWS_REGION,CONTAINER_PORT
          script: |
            aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$REGISTRY"
            docker pull "$IMAGE"
            docker rm -f churn-api || true
            docker run -d --name churn-api -p ${CONTAINER_PORT}:8000 "$IMAGE"
        env:
          CONTAINER_PORT: ${{ vars.CONTAINER_PORT }}
